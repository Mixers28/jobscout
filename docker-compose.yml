services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobscout
      POSTGRES_USER: jobscout
      POSTGRES_PASSWORD: jobscout
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobscout"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      JOBSCOUT_DATABASE_URL: postgresql+psycopg://jobscout:jobscout@postgres:5432/jobscout
      JOBSCOUT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      JOBSCOUT_DATABASE_URL: postgresql+psycopg://jobscout:jobscout@postgres:5432/jobscout
      JOBSCOUT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3001:3000"
    environment:
      # Used by Next.js server-side route handlers to reach the API container.
      # The browser always uses localhost:8001 (API port is published to host).
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
